<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Speed Test</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:700px;
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    color:white;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.text{
    background:#334155;
    padding:18px;
    border-radius:12px;
    line-height:1.8;
    font-size:18px;
}

textarea{
    width:100%;
    height:160px;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#0f172a;
    color:white;
    outline:none;
    resize:none;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

.result{
    margin-top:20px;
    background:#334155;
    padding:18px;
    border-radius:12px;
    line-height:1.8;
    font-size:18px;
}

</style>
</head>

<body>

<div class="container">

    <h2>Typing Speed Test</h2>

    <div class="text" id="text">

        JavaScript is one of the most popular programming languages in the world.

    </div>

    <textarea
    id="input"
    placeholder="Textni shu yerga yozing..."></textarea>

    <button onclick="startTest()">
        Start Test
    </button>

    <button onclick="finishTest()">
        Finish Test
    </button>

    <div class="result" id="result">

        Natija shu yerda chiqadi...

    </div>

</div>

<script>

let startTime;

function startTest(){

    startTime = new Date().getTime();

    document.getElementById("result")
    .innerHTML =
    "⌛ Typing boshlandi...";
}

function finishTest(){

    let endTime =
    new Date().getTime();

    let totalTime =
    (endTime - startTime) / 1000;

    let typedText =
    document.getElementById("input").value;

    let words =
    typedText.trim().split(" ").length;

    let speed =
    Math.round((words / totalTime) * 60);

    document.getElementById("result")
    .innerHTML = `
    
        ⏱ Time: ${totalTime.toFixed(1)} sec
        <br><br>

        📝 Words: ${words}
        <br><br>

        ⚡ Speed: ${speed} WPM

    `;
}

</script>

</body>
</html>
